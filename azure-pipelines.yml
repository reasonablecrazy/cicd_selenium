trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildArtifactName: drop

stages:

# ------------------------------------
# BUILD + TEST STAGE
# ------------------------------------
- stage: Build
  displayName: Build and Test

  jobs:
  - job: MavenBuild
    displayName: Run Maven Regression Tests

    steps:

    - checkout: self

    # Verify Java version
    - script: java -version
      displayName: Check Java Version

    # Run Maven regression tests
    - task: Maven@4
      displayName: Run Regression Tests
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean test -PRegression'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '17'
        jdkArchitectureOption: 'x64'
        publishJUnitResults: true
        testResultsFiles: '**/surefire-reports/TEST-*.xml'

    # Package application
    - task: Maven@4
      displayName: Package Application
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'package -DskipTests'
        javaHomeOption: 'JDKVersion'
        jdkVersionOption: '17'
        jdkArchitectureOption: 'x64'

    # Copy WAR file to artifact staging directory
    - task: CopyFiles@2
      displayName: Copy Build Artifact
      inputs:
        Contents: 'target/*.war'
        TargetFolder: '$(Build.ArtifactStagingDirectory)'

    # Publish artifact
    - task: PublishBuildArtifacts@1
      displayName: Publish Artifact
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: '$(buildArtifactName)'
        publishLocation: 'Container'


# ------------------------------------
# PRODUCTION DEPLOYMENT
# ------------------------------------
- stage: Deploy_Prod
  displayName: Deploy to Production
  dependsOn: Build
  condition: succeeded()

  jobs:

  - deployment: DeployWebApp
    displayName: Deploy to Azure Web App
    environment: Production

    strategy:
      runOnce:
        deploy:
          steps:

          # Download artifact from build stage
          - download: current
            artifact: $(buildArtifactName)

          # Deploy to Azure Web App
          - task: AzureWebApp@1
            displayName: Deploy WAR to Azure Web App
            inputs:
              azureSubscription: 'AzureServiceConnection'
              appType: 'webAppLinux'
              appName: 'nsquare-gadngvdfgqdndybs'
              package: '$(Pipeline.Workspace)/$(buildArtifactName)/**/*.war'